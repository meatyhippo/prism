services:
  nginx:
    image: nginx:alpine
    container_name: prism-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - prism-network

  app:
    # To use pre-built image (including ARM64/Raspberry Pi), replace 'build' with:
    # image: ghcr.io/sandydargoport/prism:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prism-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://prism:${DB_PASSWORD}@db:5432/prism
      - REDIS_URL=redis://redis:6379
      - NODE_OPTIONS=--dns-result-order=ipv4first
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - photos-cache:/app/cache/photos
      - ./data/photos:/app/data/photos
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health/ready',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - prism-network

  db:
    image: postgres:15-alpine
    container_name: prism-db
    environment:
      - POSTGRES_DB=prism
      - POSTGRES_USER=prism
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/lib/db/init:/docker-entrypoint-initdb.d
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism -d prism"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - prism-network

  redis:
    image: redis:7-alpine
    container_name: prism-redis
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - prism-network

  backup:
    build:
      context: ./scripts
      dockerfile: Dockerfile.backup
    container_name: prism-backup
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - BACKUP_HOUR=3
      - RETENTION_DAYS=7
      - RCLONE_REMOTE=onedrive:Prism/backups
      - RCLONE_RETENTION_DAYS=30
    volumes:
      - ./backups:/backups
      - ./uploads:/uploads:ro
      - ./config/rclone.conf:/root/.config/rclone/rclone.conf:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - prism-network

volumes:
  postgres-data:
    name: prism-postgres-data
  redis-data:
    name: prism-redis-data
  photos-cache:
    name: prism-photos-cache

networks:
  prism-network:
    name: prism-network
    driver: bridge
