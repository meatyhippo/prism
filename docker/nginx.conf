# Nginx reverse proxy for Prism — handles TLS termination and proxies to the app.
#
# Certs are mounted from config/certs/ on the host (generated by scripts/setup-https.ps1).
# See docs/HTTPS_SETUP.md for setup instructions.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/prism.crt;
    ssl_certificate_key /etc/nginx/certs/prism.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Large uploads (photos)
    client_max_body_size 50M;

    # Generous timeouts for sync operations (calendar, OneDrive, etc.)
    proxy_read_timeout  120s;
    proxy_send_timeout  120s;

    location / {
        proxy_pass         http://prism-app:3000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';

        # Tell Next.js the real client IP and that it arrived over HTTPS
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }
}
