name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: 'Re-capture Linux visual baselines and upload as artifact (do not enable on regular runs)'
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  typecheck-lint:
    name: Type-check & lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - run: npm run type-check

      - run: npm run lint

  unit:
    name: Unit tests (jest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Some module-level imports read these — locally a `.env` file supplies
      # them; in CI we provide throwaway values so import-time crashes don't
      # take out the whole worker.
      SESSION_SECRET: ci_test_session_secret_padding32
      PIN_ENCRYPTION_KEY: ci_test_pin_encryption_key_pad32
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      # Integration tests (src/lib/db/__tests__/integration.test.ts) require
      # a real Postgres + seeded schema. They self-skip when E2E_HAS_TEST_DB
      # is not '1' (this job doesn't set it), so a plain jest run is enough.
      - run: npm test -- --ci

  migration-replay:
    name: Migration replay (modality TODO #3)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (migrate.js needs the postgres module)
        run: npm ci

      - name: Run migration replay script
        run: bash scripts/test-migration-replay.sh

  e2e-modality:
    name: E2E modality suite (reverse-proxy)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: prism
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: prism
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prism"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://prism:ci_test_password@localhost:5432/prism
      REDIS_URL: redis://localhost:6379
      PORT: '3000'
      APP_URL: http://localhost:3000
      # Throwaway test-only values — the CI runner is ephemeral and never
      # accepts external connections. Real production secrets live in .env.
      SESSION_SECRET: ci_test_session_secret_padding32
      PIN_ENCRYPTION_KEY: ci_test_pin_encryption_key_pad32
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      # Gate flags consumed by playwright specs that are unsafe to run against
      # a real deployment (would lock out the parent account on PIN failure).
      E2E_HAS_TEST_DB: '1'
      E2E_PIN: '1234'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Apply base schema
        env:
          PGPASSWORD: ci_test_password
        run: psql -h localhost -U prism -d prism -v ON_ERROR_STOP=1 -f src/lib/db/init/02-schema.sql

      - name: Apply migrations
        run: node scripts/migrate.js

      - name: Seed database
        run: npm run db:seed

      - name: Run e2e modality suite
        run: npx playwright test e2e/reverse-proxy.spec.ts --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  visual-regression:
    name: Visual regression (modality TODO #2)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: prism
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: prism
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prism"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://prism:ci_test_password@localhost:5432/prism
      REDIS_URL: redis://localhost:6379
      PORT: '3000'
      APP_URL: http://localhost:3000
      SESSION_SECRET: ci_test_session_secret_padding32
      PIN_ENCRYPTION_KEY: ci_test_pin_encryption_key_pad32
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      E2E_HAS_TEST_DB: '1'
      E2E_PIN: '1234'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install redis-cli (reset.ts uses it when REDIS_URL is set)
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Apply base schema
        env:
          PGPASSWORD: ci_test_password
        run: psql -h localhost -U prism -d prism -v ON_ERROR_STOP=1 -f src/lib/db/init/02-schema.sql

      - name: Apply migrations
        run: node scripts/migrate.js

      - name: Seed database
        run: npm run db:seed

      # Detect whether Linux baselines have been captured yet. Until they
      # are, the compare run would fail every push because Playwright reports
      # "missing baseline" as a failure. The bootstrap flow is: trigger this
      # workflow with update_visual_baselines=true, download the artifact,
      # commit the baselines, push. From then on the compare runs as a gate.
      - name: Check for Linux baselines
        id: check-baselines
        run: |
          if ls e2e/visual-regression.spec.ts-snapshots/*-chromium-linux.png > /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      # Three execution modes:
      #   - Default + baselines exist: compare, fail on diff.
      #   - Default + no baselines: skip (advisory only, prints reminder).
      #   - workflow_dispatch with update_visual_baselines=true: regenerate
      #     Linux baselines and upload them as an artifact for download +
      #     manual commit.
      - name: Run visual regression suite (compare)
        if: ${{ steps.check-baselines.outputs.found == 'true' && (github.event_name != 'workflow_dispatch' || inputs.update_visual_baselines != true) }}
        run: npx playwright test e2e/visual-regression.spec.ts --reporter=list

      - name: Skip compare (no Linux baselines yet)
        if: ${{ steps.check-baselines.outputs.found == 'false' && (github.event_name != 'workflow_dispatch' || inputs.update_visual_baselines != true) }}
        run: |
          echo "::notice::No Linux visual baselines committed yet."
          echo "::notice::Trigger this workflow manually with 'update_visual_baselines=true' to generate them."

      - name: Run visual regression suite (update baselines)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_visual_baselines == true }}
        run: npx playwright test e2e/visual-regression.spec.ts --update-snapshots --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: playwright-report/
          retention-days: 7

      - name: Upload regenerated Linux baselines
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_visual_baselines == true }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-linux-baselines
          path: e2e/visual-regression.spec.ts-snapshots/*-chromium-linux.png
          retention-days: 14
