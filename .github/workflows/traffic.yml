name: Track Traffic Stats

on:
  schedule:
    - cron: '0 2 * * *'   # 2am UTC daily
  workflow_dispatch:        # allow manual trigger

jobs:
  traffic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch traffic data from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/${REPO}/traffic/views"     > /tmp/views.json
          gh api "repos/${REPO}/traffic/clones"    > /tmp/clones.json
          gh api "repos/${REPO}/traffic/referrers" > /tmp/referrers.json

      - name: Merge into history
        run: |
          python3 << 'PYEOF'
          import json, os, sys
          from datetime import datetime, timezone

          def load(path, default):
              if os.path.exists(path):
                  with open(path) as f:
                      return json.load(f)
              return default

          def load_api(path):
              try:
                  with open(path) as f:
                      return json.load(f)
              except Exception as e:
                  print(f"Warning: could not parse {path}: {e}", file=sys.stderr)
                  return {}

          history = load('traffic/history.json', {
              'views': {},
              'clones': {},
              'referrers': [],
              'updated_at': None,
          })

          # Merge views — keyed by YYYY-MM-DD, newer run wins
          for day in load_api('/tmp/views.json').get('views', []):
              date = day['timestamp'][:10]
              history['views'][date] = {'count': day['count'], 'uniques': day['uniques']}

          # Merge clones
          for day in load_api('/tmp/clones.json').get('clones', []):
              date = day['timestamp'][:10]
              history['clones'][date] = {'count': day['count'], 'uniques': day['uniques']}

          # Referrers — always replace with latest (rolling 14-day window)
          history['referrers'] = load_api('/tmp/referrers.json') if isinstance(load_api('/tmp/referrers.json'), list) else []
          history['updated_at'] = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          os.makedirs('traffic', exist_ok=True)
          with open('traffic/history.json', 'w') as f:
              json.dump(history, f, indent=2, sort_keys=True)

          total_views   = sum(d['count']   for d in history['views'].values())
          total_uniques = sum(d['uniques'] for d in history['views'].values())
          print(f"Days tracked: {len(history['views'])}  |  Total views: {total_views}  |  Total unique: {total_uniques}")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic/
          git diff --staged --quiet || git commit -m "chore: traffic stats $(date -u +%Y-%m-%d)"
          git push
